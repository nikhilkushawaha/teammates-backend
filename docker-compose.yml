version: '3.8'

services:
  # Your Node.js backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      BASE_PATH: /api
      MONGO_URI: mongodb://mongo:27017/teammates
      SESSION_SECRET: dev-secret-change-in-production
      SESSION_EXPIRES_IN: 1d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-client-secret}
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
      FRONTEND_ORIGIN: http://localhost:5173
      FRONTEND_GOOGLE_CALLBACK_URL: http://localhost:5173/auth/google/callback
    depends_on:
      - mongo
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    networks:
      - teammates-network

  # MongoDB database
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: teammates
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - teammates-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: Mongo Express for database management
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - teammates-network

volumes:
  mongodb_data:

networks:
  teammates-network:
    driver: bridge
